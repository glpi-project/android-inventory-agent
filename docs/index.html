<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLPI Android Inventory Agent</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 1rem;
    }
    img { width: 80px; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p  { color: #666; margin-bottom: 1.5rem; max-width: 360px; }
    .btn {
      display: inline-block;
      background: #1f72b5;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
    }
    .btn:hover { background: #155a94; }
  </style>
</head>
<body>
  <h1>GLPI Android Inventory Agent</h1>
  <p>
    To use this configuration link, please install the
    <strong>GLPI Android Inventory Agent</strong> app and open this link again.
  </p>
  <a class="btn"
     href="https://play.google.com/store/apps/details?id=org.glpi.inventory.agent">
    Download on Google Play
  </a>
</body>
</html>
